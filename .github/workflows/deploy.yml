name: Build & Push image

# Build and push the container image on every push to main, on GitHub-hosted
# runners. Deploy is intentionally NOT done here: the k3s cluster's API isn't
# public, so a hosted runner can't reach it. Rolling the new image out happens
# on the cluster box — see deploy/README.md ("Deploying").
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE: danieltesh/noteapp
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        # Short SHA (7 chars) — the immutable tag the deploy step rolls out.
        run: echo "sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
