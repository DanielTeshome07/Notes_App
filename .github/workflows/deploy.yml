name: Deploy Notes App

# Push to main = update the website. Runs entirely on a self-hosted runner that
# lives on the cluster machine (pop-os), so it has local docker + kubectl and the
# k3s API never has to be exposed. See deploy/README.md ("CI/CD") for runner setup.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# The app is a single replica writing one ReadWriteOnce SQLite volume, and the
# Deployment uses strategy: Recreate. Never let two deploys overlap.
concurrency:
  group: deploy-noteapp
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    env:
      IMAGE: danieltesh/noteapp
      NAMESPACE: noteapp
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        # Short SHA (7 chars) — same immutable tag the manual flow uses.
        run: echo "sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        run: |
          docker build \
            -t "$IMAGE:${{ steps.tag.outputs.sha }}" \
            -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ steps.tag.outputs.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to k3s
        run: |
          kubectl -n "$NAMESPACE" set image \
            deploy/noteapp noteapp="$IMAGE:${{ steps.tag.outputs.sha }}"
          kubectl -n "$NAMESPACE" rollout status deploy/noteapp --timeout=120s

      - name: Verify health
        # The runner is on the cluster host, so it can hit the pinned NodePort
        # the cloudflared tunnel forwards note.danielteshome.dev to.
        run: |
          code=$(curl -fsS -o /dev/null -w '%{http_code}' http://localhost:30568/healthz)
          echo "healthz returned $code"
          test "$code" = "200"
