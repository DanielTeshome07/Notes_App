# Template only — DO NOT commit a real password. Create the Secret directly with
# kubectl (see deploy/README.md) so the password never lands in git:
#
#   kubectl -n noteapp create secret generic noteapp-secret \
#     --from-literal=app-password='CHOOSE-A-STRONG-PASSWORD' \
#     --from-literal=flask-secret-key="$(openssl rand -hex 32)"
#
apiVersion: v1
kind: Secret
metadata:
  name: noteapp-secret
  namespace: noteapp
type: Opaque
stringData:
  app-password: CHANGE-ME
  flask-secret-key: CHANGE-ME-TO-A-RANDOM-64-CHAR-HEX
