<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes App — Personal Knowledge Base</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>
    // Apply saved/system theme before paint to avoid a flash of the wrong theme.
    (function () {
      const saved = localStorage.getItem("theme");
      const dark = saved ? saved === "dark"
        : window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (dark) document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>
</head>
<body>
  <header>
    <div class="header-bar">
      <div class="brand">
        <h1>📒 Notes</h1>
        <p class="tagline">Search everything down to the paragraph.</p>
      </div>
      <div class="header-actions">
        <button id="theme-toggle" class="icon-btn" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
        <form method="POST" action="{{ url_for('logout') }}" id="logout-form">
          <button type="submit" class="icon-btn" title="Sign out" aria-label="Sign out">⎋</button>
        </form>
      </div>
    </div>
  </header>

  <main>
    <!-- Search -->
    <section class="card search-card">
      <form id="search-form" autocomplete="off">
        <input type="search" id="search-input" placeholder="Search your notes and documents…" aria-label="Search">
        <button type="submit">Search</button>
      </form>
      <p class="hint">
        Try <code>"exact phrase"</code>, <code>meet*</code> (prefix), or
        <code>deadline NEAR/3 budget</code>.
      </p>
      <div id="tag-filter" class="tag-filter hidden"></div>
      <div id="search-status" class="status"></div>
      <div id="results"></div>
    </section>

    <div class="columns">
      <!-- Add note -->
      <section class="card">
        <h2>Add a note</h2>
        <form id="note-form">
          <input type="text" id="note-title" placeholder="Title (optional)">
          <textarea id="note-content" rows="6" placeholder="Paste or type anything… separate paragraphs with a blank line."></textarea>
          <input type="text" id="note-tags" placeholder="Tags (comma separated, optional)">
          <button type="submit">Save note</button>
        </form>
      </section>

      <!-- Upload -->
      <section class="card">
        <h2>Upload a file</h2>
        <div id="dropzone" class="dropzone">
          <p class="dropzone-text">Drag &amp; drop a file here, or click to choose</p>
          <p class="hint">PDF, DOCX, or TXT</p>
          <input type="file" id="file-input" accept=".pdf,.docx,.txt" multiple hidden>
        </div>
        <input type="text" id="upload-tags" placeholder="Tags for upload (comma separated, optional)">
      </section>
    </div>

    <!-- Documents -->
    <section class="card">
      <div class="section-head">
        <h2>Your documents</h2>
        <button id="new-file-btn" class="btn-secondary">＋ New file</button>
      </div>
      <p id="doc-count" class="muted" style="margin:0 0 0.4rem"></p>
      <div id="documents"><p class="muted">Loading…</p></div>
    </section>
  </main>

  <!-- Editor overlay -->
  <div id="editor" class="editor-overlay hidden" role="dialog" aria-modal="true" aria-label="Document editor">
    <div class="editor-panel">
      <div class="editor-head">
        <h2 id="editor-heading">New file</h2>
        <span id="editor-badge"></span>
        <button id="editor-close" class="icon-btn" title="Close" aria-label="Close editor">✕</button>
      </div>
      <div class="editor-body">
        <input type="text" id="editor-title" placeholder="Title (optional — first line is used if blank)">
        <input type="text" id="editor-tags" placeholder="Tags (comma separated, optional)">
        <textarea id="editor-content" class="editor-textarea" placeholder="Write anything… line breaks are preserved."></textarea>
      </div>
      <div class="editor-foot">
        <button id="editor-save">Save</button>
        <span class="spacer"></span>
        <button id="export-pdf" class="btn-secondary" title="Download as PDF">PDF</button>
        <button id="export-docx" class="btn-secondary" title="Download as Word .docx">.docx</button>
        <button id="export-txt" class="btn-secondary" title="Download as plain text">.txt</button>
        <button id="editor-print" class="btn-secondary" title="Open the print dialog">🖨 Print</button>
      </div>
    </div>
  </div>

  <div id="toasts" class="toasts" aria-live="polite"></div>

  <script>
    const $ = (sel) => document.querySelector(sel);
    let activeTag = null;

    // ---- theme ----
    function currentlyDark() {
      return document.documentElement.getAttribute("data-theme") === "dark";
    }
    function updateThemeIcon() {
      $("#theme-toggle").textContent = currentlyDark() ? "☀️" : "🌙";
    }
    $("#theme-toggle").addEventListener("click", () => {
      const dark = !currentlyDark();
      document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
      localStorage.setItem("theme", dark ? "dark" : "light");
      updateThemeIcon();
    });
    updateThemeIcon();

    // ---- helpers ----
    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }
    const MARK_OPEN = String.fromCharCode(2);
    const MARK_CLOSE = String.fromCharCode(3);
    function renderSnippet(snippet) {
      return escapeHtml(snippet)
        .split(MARK_OPEN).join("<mark>")
        .split(MARK_CLOSE).join("</mark>");
    }
    function tagsHtml(tags) {
      if (!tags || !tags.length) return "";
      return '<span class="tags">' + tags.map((t) =>
        `<button class="tag" data-tag="${escapeHtml(t)}">#${escapeHtml(t)}</button>`
      ).join("") + "</span>";
    }
    function setStatus(el, msg, kind) {
      el.textContent = msg;
      el.className = "status" + (kind ? " " + kind : "");
    }
    function toast(msg, kind) {
      const el = document.createElement("div");
      el.className = "toast" + (kind ? " " + kind : "");
      el.textContent = msg;
      $("#toasts").appendChild(el);
      setTimeout(() => el.classList.add("show"), 10);
      setTimeout(() => { el.classList.remove("show"); setTimeout(() => el.remove(), 300); }, 3200);
    }
    // Any 401 means the session expired — bounce to the login page.
    async function api(url, opts) {
      const res = await fetch(url, opts);
      if (res.status === 401) { window.location = "/login"; throw new Error("unauthorized"); }
      return res;
    }

    // ---- tag filtering ----
    function setTagFilter(tag) {
      activeTag = tag;
      const bar = $("#tag-filter");
      if (tag) {
        bar.classList.remove("hidden");
        bar.innerHTML = `Filtering by <span class="tag active">#${escapeHtml(tag)}</span> ` +
          `<button id="clear-tag" class="link-btn">clear</button>`;
        $("#clear-tag").addEventListener("click", () => setTagFilter(null));
      } else {
        bar.classList.add("hidden");
        bar.innerHTML = "";
      }
      loadDocuments();
      if ($("#search-input").value.trim()) runSearch($("#search-input").value);
    }
    // Delegate clicks on any tag chip.
    document.addEventListener("click", (e) => {
      const t = e.target.closest(".tag[data-tag]");
      if (t) { e.preventDefault(); setTagFilter(t.dataset.tag); }
    });

    // ---- search ----
    async function runSearch(q) {
      const status = $("#search-status");
      const results = $("#results");
      if (!q.trim()) { results.innerHTML = ""; setStatus(status, ""); return; }
      setStatus(status, "Searching…");
      try {
        let url = "/search?q=" + encodeURIComponent(q);
        if (activeTag) url += "&tag=" + encodeURIComponent(activeTag);
        const data = await (await api(url)).json();
        if (!data.count) {
          results.innerHTML = "";
          setStatus(status, "No matches found" + (activeTag ? ` in #${activeTag}` : "") + ".");
          return;
        }
        setStatus(status, `${data.count} matching paragraph${data.count === 1 ? "" : "s"}.`);
        results.innerHTML = data.results.map((r) => `
          <article class="result">
            <div class="result-meta">
              <span class="badge badge-${escapeHtml(r.source_type)}">${escapeHtml(r.source_type)}</span>
              <span class="result-title">${escapeHtml(r.title)}</span>
              ${tagsHtml(r.tags)}
            </div>
            <p class="result-snippet clamp">${renderSnippet(r.snippet)}</p>
          </article>
        `).join("");
        // Click a snippet to expand/collapse long paragraphs.
        results.querySelectorAll(".result-snippet").forEach((p) => {
          p.addEventListener("click", () => p.classList.toggle("clamp"));
        });
      } catch (e) {
        if (e.message !== "unauthorized") setStatus(status, "Search failed.", "error");
      }
    }
    $("#search-form").addEventListener("submit", (e) => {
      e.preventDefault();
      runSearch($("#search-input").value);
    });

    // ---- add note ----
    $("#note-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const content = $("#note-content").value;
      if (!content.trim()) { toast("Note is empty.", "error"); return; }
      const btn = e.submitter; btn.disabled = true;
      try {
        const res = await api("/add", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            title: $("#note-title").value,
            content,
            tags: $("#note-tags").value,
          }),
        });
        const data = await res.json();
        if (!res.ok) { toast(data.error || "Failed.", "error"); return; }
        toast(`Saved “${data.title}” (${data.chunks} ¶).`, "ok");
        $("#note-form").reset();
        loadDocuments();
      } catch (e) {
        if (e.message !== "unauthorized") toast("Save failed.", "error");
      } finally { btn.disabled = false; }
    });

    // ---- upload (button + drag & drop, multiple files) ----
    const dropzone = $("#dropzone");
    const fileInput = $("#file-input");
    dropzone.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => uploadFiles(fileInput.files));
    ["dragenter", "dragover"].forEach((ev) =>
      dropzone.addEventListener(ev, (e) => { e.preventDefault(); dropzone.classList.add("dragover"); }));
    ["dragleave", "drop"].forEach((ev) =>
      dropzone.addEventListener(ev, (e) => { e.preventDefault(); dropzone.classList.remove("dragover"); }));
    dropzone.addEventListener("drop", (e) => uploadFiles(e.dataTransfer.files));

    async function uploadFiles(fileList) {
      const files = Array.from(fileList);
      if (!files.length) return;
      const tags = $("#upload-tags").value;
      for (const file of files) {
        const fd = new FormData();
        fd.append("file", file);
        fd.append("tags", tags);
        toast(`Uploading ${file.name}…`);
        try {
          const res = await api("/upload", { method: "POST", body: fd });
          const data = await res.json();
          if (!res.ok) { toast(`${file.name}: ${data.error || "failed"}`, "error"); continue; }
          toast(`Uploaded “${data.title}” (${data.chunks} ¶).`, "ok");
        } catch (e) {
          if (e.message !== "unauthorized") toast(`${file.name}: upload failed.`, "error");
        }
      }
      fileInput.value = "";
      loadDocuments();
    }

    // ---- documents list ----
    async function loadDocuments() {
      const box = $("#documents");
      try {
        const data = await (await api("/documents")).json();
        let docs = data.documents;
        if (activeTag) docs = docs.filter((d) => (d.tags || []).includes(activeTag));
        $("#doc-count").textContent = docs.length
          ? `${docs.length} document${docs.length === 1 ? "" : "s"}` : "";
        if (!docs.length) {
          box.innerHTML = activeTag
            ? `<p class="muted">No documents tagged #${escapeHtml(activeTag)}.</p>`
            : '<p class="muted">No documents yet. Add a note or upload a file to get started.</p>';
          return;
        }
        box.innerHTML = docs.map((d) => `
          <div class="doc-row">
            <span class="badge badge-${escapeHtml(d.source_type)}">${escapeHtml(d.source_type)}</span>
            <button class="doc-title-btn" data-open="${d.id}" title="Open in editor">${escapeHtml(d.title)}</button>
            ${tagsHtml(d.tags)}
            <span class="doc-count">${d.chunk_count} ¶</span>
            <button class="delete-btn" data-id="${d.id}" title="Delete">✕</button>
          </div>
        `).join("");
        box.querySelectorAll(".delete-btn").forEach((btn) =>
          btn.addEventListener("click", () => deleteDocument(btn.dataset.id)));
        box.querySelectorAll(".doc-title-btn").forEach((btn) =>
          btn.addEventListener("click", () => openEditor(btn.dataset.open)));
      } catch (e) {
        if (e.message !== "unauthorized") box.innerHTML = '<p class="status error">Could not load documents.</p>';
      }
    }

    async function deleteDocument(id) {
      if (!confirm("Delete this document and all its paragraphs?")) return;
      try {
        await api("/delete/" + id, { method: "POST" });
        toast("Deleted.", "ok");
        loadDocuments();
        if ($("#search-input").value.trim()) runSearch($("#search-input").value);
      } catch (e) {
        if (e.message !== "unauthorized") toast("Delete failed.", "error");
      }
    }

    // ---- editor ----
    // currentDoc is null for an unsaved new file, otherwise the open doc's id.
    let currentDoc = null;

    function openEditorPanel() {
      $("#editor").classList.remove("hidden");
      $("#editor-content").focus();
    }
    function closeEditor() {
      $("#editor").classList.add("hidden");
      currentDoc = null;
    }
    function fillEditor({ id, title, tags, content, source_type }) {
      currentDoc = id;
      $("#editor-title").value = title || "";
      $("#editor-tags").value = (tags || []).join(", ");
      $("#editor-content").value = content || "";
      $("#editor-heading").textContent = id ? "Edit document" : "New file";
      const badge = $("#editor-badge");
      badge.innerHTML = source_type
        ? `<span class="badge badge-${escapeHtml(source_type)}">${escapeHtml(source_type)}</span>` : "";
    }

    function newFile() {
      fillEditor({ id: null, title: "", tags: [], content: "", source_type: "" });
      openEditorPanel();
    }

    async function openEditor(id) {
      try {
        const res = await api("/document/" + id);
        const data = await res.json();
        if (!res.ok) { toast(data.error || "Could not open.", "error"); return; }
        fillEditor(data);
        openEditorPanel();
      } catch (e) {
        if (e.message !== "unauthorized") toast("Could not open document.", "error");
      }
    }

    // Persist the editor. Returns the saved id, or null on failure.
    async function saveEditor() {
      const content = $("#editor-content").value;
      if (!content.trim()) { toast("Nothing to save — the document is empty.", "error"); return null; }
      const body = JSON.stringify({
        title: $("#editor-title").value,
        content,
        tags: $("#editor-tags").value,
      });
      const url = currentDoc ? "/document/" + currentDoc : "/add";
      try {
        const res = await api(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body,
        });
        const data = await res.json();
        if (!res.ok) { toast(data.error || "Save failed.", "error"); return null; }
        currentDoc = data.id;
        $("#editor-heading").textContent = "Edit document";
        toast(`Saved “${data.title}”.`, "ok");
        loadDocuments();
        if ($("#search-input").value.trim()) runSearch($("#search-input").value);
        return data.id;
      } catch (e) {
        if (e.message !== "unauthorized") toast("Save failed.", "error");
        return null;
      }
    }

    // Exports read from the server, so the current text must be saved first.
    async function exportAs(fmt) {
      const id = await saveEditor();
      if (!id) return;
      const a = document.createElement("a");
      a.href = `/export/${id}/${fmt}`;
      a.download = "";
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    // Print is client-side so it works without a round-trip, preserving line breaks.
    function printEditor() {
      const title = $("#editor-title").value.trim() || "Untitled";
      const content = $("#editor-content").value;
      const w = window.open("", "_blank");
      if (!w) { toast("Pop-up blocked — allow pop-ups to print.", "error"); return; }
      w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${escapeHtml(title)}</title>
        <style>body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.55;
        max-width:42rem;margin:2rem auto;padding:0 1rem;color:#000}
        h1{font-size:1.4rem}pre{white-space:pre-wrap;font:inherit;margin:0}</style></head>
        <body><h1>${escapeHtml(title)}</h1><pre>${escapeHtml(content)}</pre></body></html>`);
      w.document.close();
      w.focus();
      w.print();
    }

    $("#new-file-btn").addEventListener("click", newFile);
    $("#editor-close").addEventListener("click", closeEditor);
    $("#editor-save").addEventListener("click", saveEditor);
    $("#export-pdf").addEventListener("click", () => exportAs("pdf"));
    $("#export-docx").addEventListener("click", () => exportAs("docx"));
    $("#export-txt").addEventListener("click", () => exportAs("txt"));
    $("#editor-print").addEventListener("click", printEditor);
    // Click the dark backdrop (not the panel) or press Esc to close.
    $("#editor").addEventListener("click", (e) => { if (e.target.id === "editor") closeEditor(); });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !$("#editor").classList.contains("hidden")) closeEditor();
    });

    loadDocuments();
  </script>
</body>
</html>
