<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Notes</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>
    // Apply saved/system theme before paint to avoid a flash.
    (function () {
      const saved = localStorage.getItem("theme");
      const dark = saved ? saved === "dark"
        : window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (dark) document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>
</head>
<body class="login-body">
  <main class="login-card card">
    <h1>📒 Notes</h1>
    <p class="muted">This knowledge base is private. Enter the password to continue.</p>
    {% if error %}<div class="status error">{{ error }}</div>{% endif %}
    <form method="POST" action="{{ url_for('login') }}{% if request.args.get('next') %}?next={{ request.args.get('next')|urlencode }}{% endif %}">
      <input type="password" name="password" placeholder="Password" autofocus required>
      <button type="submit">Sign in</button>
    </form>
  </main>
</body>
</html>
